name: Vantirs Background Jobs

on:
  schedule:
    # Continuous validation rescan — 10am UTC daily
    - cron: '0 10 * * *'
    # QBO incremental sync — every 4 hours
    - cron: '0 */4 * * *'
    # Xero incremental sync — every 4 hours (offset by 1h to avoid overlap)
    - cron: '0 1/4 * * *'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  rescan-invoices:
    if: github.event.schedule == '0 10 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Continuous validation — rescan open invoices
        run: |
          curl -f -s -X POST "https://www.vantirs.com/api/cron/rescan" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            | tee /dev/stderr

  qbo-sync:
    if: github.event.schedule == '0 */4 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: QBO incremental sync — all clients
        run: |
          curl -f -s -X POST "https://www.vantirs.com/api/cron/qbo-sync" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            | tee /dev/stderr

  xero-sync:
    if: github.event.schedule == '0 1/4 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Xero incremental sync — all clients
        run: |
          curl -f -s -X POST "https://www.vantirs.com/api/cron/xero-sync" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            | tee /dev/stderr
